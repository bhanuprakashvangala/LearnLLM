name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Stubs so the build doesn't fail when secrets aren't injected for CI.
          # Production secrets live in Vercel and are injected on deploy.
          NEXTAUTH_SECRET: "ci-placeholder-not-used-for-real-auth"
          NEXTAUTH_URL: "http://localhost:3000"
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
